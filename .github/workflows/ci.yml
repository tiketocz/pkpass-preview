name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Bun handles install, the library bundle (Bun.build), and now also
      # tsc + vitest under its own Node-compat runtime. setup-node is not
      # needed in CI — see release.yml for where it kicks in (npm publish
      # requires npm 11.x which only ships with Node 24 in setup-node's
      # toolcache).
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: install
        run: bun install --frozen-lockfile

      - name: lint (biome)
        run: bun run lint

      - name: typecheck (tsc)
        run: bun run typecheck

      - name: test (vitest)
        run: bun run test

      - name: build library (Bun.build)
        run: bun run build

      - name: build storybook
        run: bun run storybook:build

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Bun handles install + (eventually, M1.1) the library bundle via
      # Bun.build(); Node 22 runs tsc + vitest. Both runtimes are needed —
      # keep parallel.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: install
        run: bun install --frozen-lockfile

      - name: lint (biome)
        run: bun run lint

      - name: typecheck (tsc)
        run: bun run typecheck

      - name: test (vitest)
        run: bun run test

name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: build + deploy storybook to gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: install
        run: bun install --frozen-lockfile

      - name: build library
        run: bun run build

      - name: build storybook
        run: bun run storybook:build

      # Deploy to the gh-pages branch (root). Preserves /pr-preview/* so
      # open PR-preview deploys (rossjrw/pr-preview-action) are not wiped
      # when main re-deploys.
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: packages/storybook/storybook-static
          clean: true
          clean-exclude: |
            pr-preview

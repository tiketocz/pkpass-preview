name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# OIDC token for npm trusted publishing — no NPM_TOKEN secret.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Node 24 ships npm 11.x, which is the first npm major to handle the
      # trusted-publishing OIDC handshake (npm 10 signs provenance but the
      # final PUT fails with E404 because the registry call drops the
      # npm-aud claim). Picking 24 here is purely a release-side bump —
      # the library targets ES2022 and stays compatible with Node 18+.
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org

      - name: cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: install
        run: bun install --frozen-lockfile

      - name: lint
        run: bun run lint

      - name: typecheck
        run: bun run typecheck

      - name: test
        run: bun run test

      - name: build library
        run: bun run build

      - name: tag matches packages/preview/package.json version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(node -p "require('./packages/preview/package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match packages/preview version $pkg"
            exit 1
          fi
          echo "tag $tag matches package version $pkg"

      - name: publish
        working-directory: packages/preview
        run: npm publish --access public --provenance

name: vrt

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vrt-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  vrt:
    name: visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: check out PR head
        uses: actions/checkout@v4
        with:
          path: head
          ref: ${{ github.event.pull_request.head.sha }}

      - name: check out PR base
        uses: actions/checkout@v4
        with:
          path: base
          ref: ${{ github.event.pull_request.base.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-vrt-${{ hashFiles('head/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: install deps — head
        working-directory: head
        run: bun install --frozen-lockfile

      - name: install deps — base
        working-directory: base
        run: bun install --frozen-lockfile

      - name: install Playwright Chromium
        working-directory: head
        run: bunx playwright install --with-deps chromium

      # Storybook resolves @tiketo/pkpass-preview against the built dist/,
      # so the library has to be built before the storybook on each side.
      - name: build library — head
        working-directory: head
        run: bun run build

      - name: build storybook — head
        working-directory: head
        run: bun run storybook:build

      - name: build library — base
        working-directory: base
        run: bun run build

      - name: build storybook — base
        working-directory: base
        run: bun run storybook:build

      # Base may pre-date the introduction of the VRT script (e.g. the PR
      # that introduces vrt.yml itself). Always run the head-checkout script
      # against both storybook builds so a missing scripts/ on base does not
      # break the report.
      - name: VRT against base storybook
        working-directory: head
        env:
          STORYBOOK_DIR: ${{ github.workspace }}/base/packages/storybook/storybook-static
          OUT_DIR: ${{ github.workspace }}/vrt-base
          STORYBOOK_PORT: "9700"
        run: bun run vrt

      - name: VRT against head storybook
        working-directory: head
        env:
          STORYBOOK_DIR: ${{ github.workspace }}/head/packages/storybook/storybook-static
          OUT_DIR: ${{ github.workspace }}/vrt-head
          STORYBOOK_PORT: "9701"
        run: bun run vrt

      - name: build comparison comment
        working-directory: head
        run: |
          bun run scripts/vrt-compare.mjs \
            "${{ github.workspace }}/vrt-base/report.json" \
            "${{ github.workspace }}/vrt-head/report.json" \
            main "PR #${{ github.event.pull_request.number }}" \
            > "${{ github.workspace }}/vrt-comment.md"

      - name: upsert PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vrt-info-report
          path: ${{ github.workspace }}/vrt-comment.md

      - name: upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-reports
          path: |
            vrt-base/
            vrt-head/
          retention-days: 14
